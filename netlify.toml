[build]
  command = "npm run build:films"
  publish = "."

# The letters point at /stand.html (the canonical giving page). Until that
# page is built, send people to the giving stones on the films page. This
# redirect stops applying automatically once a real stand.html file exists.
[[redirects]]
  from = "/stand.html"
  to = "/films.html#stand"
  status = 301

# short URL printed on the films' closing card
[[redirects]]
  from = "/films"
  to = "/films.html"
  status = 301

# short URL used in the From Above broadcast letter
[[redirects]]
  from = "/from-above"
  to = "/from-above.html"
  status = 301

# short URL used in the Wall of Light broadcast letter
[[redirects]]
  from = "/wall-of-light"
  to = "/wall-of-light.html"
  status = 301
