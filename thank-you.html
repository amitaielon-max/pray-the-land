<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome to the Wall · Pray the Land</title>
<meta http-equiv="refresh" content="6; url=/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--basalt:#171310;--basalt-2:#211C17;--gold:#C9A227;--warm-white:#EAE2CE;--parchment-dim:#cabfa6;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Frank Ruhl Libre',Georgia,serif;min-height:100svh;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;padding:32px;
    background:radial-gradient(120% 90% at 50% 115%, #3a2c12 0%, #241a10 34%, var(--basalt) 66%);color:var(--warm-white)}
  .eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:clamp(40px,8vw,72px);
    color:var(--warm-white);margin:20px 0 0;line-height:1.05}
  .rule{width:90px;height:2px;background:var(--gold);margin:30px auto}
  p{font-size:clamp(16px,2vw,19px);line-height:1.8;color:var(--parchment-dim);max-width:520px}
  .verse{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,3vw,26px);
    color:var(--warm-white);margin-top:30px}
  a{color:var(--gold);text-decoration:none;font-weight:700;margin-top:34px;display:inline-block;
    border:1px solid var(--gold);padding:13px 26px;border-radius:2px}
  a:hover{background:rgba(201,162,39,.12)}
  .small{font-size:13px;color:#9a8f79;margin-top:26px;font-style:italic}
</style>
</head>
<body>
  <div class="eyebrow">Havat HaChaim · Golan Heights</div>
  <h1>Welcome to the wall.</h1>
  <div class="rule"></div>
  <p>Your name has reached the hill. The next letter will find you. The same sunset, the same rest, one wall.</p>
  <div class="verse">The covenant holds.<br>The gates shall not prevail.</div>
  <a href="/">Return to the hill</a>
  <div class="small">Shalom from the Golan Heights.</div>
</body>
</html>
